databases:
  - name: proctorai-db
    plan: free
    databaseName: proctorai
    user: proctorai_user

services:
  - type: web
    name: proctorai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: proctorai-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: YOLO_CONFIG_DIR
        value: /tmp
      - key: AI_FRAME_WIDTH
        value: "480"
      - key: AI_YOLO_IMAGE_SIZE
        value: "480"
      - key: AI_YOLO_MIN_INTERVAL_SECONDS
        value: "0.5"
      - key: PYTHON_VERSION
        value: "3.11.6"
